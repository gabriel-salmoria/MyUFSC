name: DevSecOps Pipeline

on:
  push:
    branches: [devsecops, main]
  pull_request:
    branches: [devsecops, main]

permissions:
  contents: read

jobs:

  # ── 1. Secret Detection ───────────────────────────────────────────────────────
  secrets:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. SCA ────────────────────────────────────────────────────────────────────
  sca:
    name: SCA — Dependency Audit
    runs-on: ubuntu-latest
    needs: secrets
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (blocks on HIGH+)
        run: pnpm audit --audit-level high

      - name: Trivy — npm + Cargo SCA
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-sca.sarif
          limit-severities-for-sarif: true

      - name: Upload SCA SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        if: always()
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca

  # ── 3. SAST ───────────────────────────────────────────────────────────────────
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    needs: secrets
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep scan (generate SARIF)
        id: semgrep
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/react \
            --config p/nextjs \
            --sarif --output semgrep.sarif \
            .
        continue-on-error: true

      - name: Upload SAST SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Quality gate
        if: steps.semgrep.outcome == 'failure'
        run: |
          echo "Semgrep found security issues. Review the SARIF report in the Security tab."
          exit 1

  # ── 4. IaC Scanning ───────────────────────────────────────────────────────────
  iac:
    name: IaC Scanning — Trivy + Zizmor
    runs-on: ubuntu-latest
    needs: secrets
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Trivy — Dockerfile scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-iac.sarif
          limit-severities-for-sarif: true

      - name: Upload Dockerfile SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        if: always()
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

      - name: Install Zizmor
        run: pip install zizmor

      - name: Zizmor — GitHub Actions security scan
        id: zizmor
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif
        continue-on-error: true

      - name: Upload Zizmor SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        if: always()
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Quality gate
        if: steps.zizmor.outcome == 'failure'
        run: |
          echo "Zizmor found GitHub Actions security issues."
          zizmor .github/workflows/
          exit 1

  # ── 5. DAST ───────────────────────────────────────────────────────────────────
  dast:
    name: DAST — OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: [sca, sast, iac]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm build
        env:
          DB_PROVIDER: local

      - name: Start app in background
        run: pnpm start &
        env:
          DB_PROVIDER: local
          PORT: 3000

      - name: Wait for app to be ready
        run: npx wait-on http-get://localhost:3000 --timeout 60000

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25  # v0.15.0
        with:
          target: http://localhost:3000
          rules_file_name: .zap/rules.tsv
          fail_action: true
          docker_name: ghcr.io/zaproxy/zaproxy:stable
